server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index evaluacion.html;

    # Raíz → quiz
    location = / {
        try_files /evaluacion.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # config.js se inyecta por entorno en cada arranque: no cachear.
    location = /config.js {
        add_header Cache-Control "no-store";
    }

    # Cache razonable para el HTML del quiz.
    location = /evaluacion.html {
        add_header Cache-Control "no-cache";
    }
}
